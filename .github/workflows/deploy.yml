name: Deploy UK Job Agent

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # 1. ZIP LAMBDA CODE
      # -----------------------------
      - name: Zip Lambda
        run: |
          cd src/lambda_functions
          zip -r ../../job-agent.zip .

      # -----------------------------
      # 2. CONFIGURE AWS
      # -----------------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      # -----------------------------
      # 3. UPLOAD ZIP TO S3
      # -----------------------------
      - name: Upload Lambda zip to S3
        run: |
          aws s3 cp job-agent.zip s3://uk-job-agent-deploy-bucket/job-agent.zip

      # -----------------------------
      # 4. DEPLOY CLOUDFORMATION
      # -----------------------------
      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file ci-cd/cfn/infra.yml \
            --stack-name uk-job-agent-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TavilyKey=${{ secrets.TAVILY_API_KEY }} \
              EmailPassword=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              LambdaS3Bucket=uk-job-agent-deploy-bucket \
              LambdaS3Key=job-agent.zip